<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Recipe Finder</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<div id="page">
<div id="app">
    <h1>Recipe Finder</h1>

    <div>
        <input type="text" id="search-input" placeholder="Search recipes...">
        <button id="search-btn">Search</button>
        <button id="favorites-btn">❤️ Favorites</button>
    </div>

    <div style="display: flex; margin-top: 20px;">
        <div style="width: 300px; border-right: 1px solid #ccc; padding-right: 20px;">
            <h3>Filters</h3>

            <h4>Select ingredients:</h4>
            <div id="ingredients-list" style="height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px;">
                Loading ingredients...
            </div>

            <button id="filter-btn">Filter recipes</button>
            <button id="clear-btn">Clear selection</button>

            <h4>Category:</h4>
            <select id="category-filter">
                <option value="">All</option>
            </select>

            <h4>Difficulty:</h4>
            <select id="difficulty-filter">
                <option value="">All</option>
            </select>

            <div style="margin-top: 20px;">
                <button id="random-btn">Random recipe</button>
            </div>
        </div>

        <div style="flex: 1; padding-left: 20px;">
            <div id="recipes-section">
                <h2>Recipes <span id="recipe-count"></span></h2>
                <div id="recipes-container">
                    Loading recipes...
                </div>
                <div id="no-results" style="display: none;">No recipes found</div>
            </div>

            <div id="detail-section" style="display: none;">
                <button id="back-btn">← Back</button>
                <div id="recipe-detail"></div>
            </div>
        </div>
    </div>

    <div style="margin-top: 30px; padding-top: 10px; border-top: 1px solid #ccc;">
        <div id="api-status">API Status: Connecting...</div>
    </div>
</div>
</div>

<script src="js/app.js"></script>
</body>
</html>
